<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, viewport-fit=cover" />
    <title>Snatch&GrabIt! - Multiplayer Card Game</title>
    <meta name="description" content="Play Snatch&GrabIt!, a fast-paced multiplayer competitive solitaire game. Race against other players to empty your bone pile first! Powered by AppSmith.">
    <!-- PWA: web-app manifest + install metadata -->
    <link rel="manifest" href="/manifest.webmanifest">
    <meta name="theme-color" content="#0e111b" media="(prefers-color-scheme: dark)">
    <meta name="theme-color" content="#fdf8ed" media="(prefers-color-scheme: light)">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Snatch&GrabIt!">
    <link rel="icon" type="image/svg+xml" href="/icon.svg">
    <link rel="apple-touch-icon" href="/icon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Roboto+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!--
      Google AdSense — site verification + auto-ads loader. The meta tag
      proves ownership of the domain to Google's crawler; the <script>
      pulls in the AdSense bundle that fills configured ad slots.
    -->
    <meta name="google-adsense-account" content="ca-pub-2344271093839123">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2344271093839123" crossorigin="anonymous"></script>
    <script>
      // Apply persisted theme class before React mounts to avoid a dark/light
      // flash on initial paint. Mirrors the default in client/src/hooks/use-theme.ts.
      (function () {
        try {
          var stored = localStorage.getItem('sg-theme');
          var theme = stored === 'light' || stored === 'dark' ? stored : 'dark';
          document.documentElement.classList.add(theme);
        } catch (_) {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
