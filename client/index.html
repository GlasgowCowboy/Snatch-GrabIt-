<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>Snatch&GrabIt! - Multiplayer Card Game</title>
    <meta name="description" content="Play Snatch&GrabIt!, a fast-paced multiplayer competitive solitaire game. Race against other players to empty your bone pile first! Powered by AppSmith.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Roboto+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!--
      Google AdSense — uncomment and fill in `pub-XXXXXXXXXXXXXXXX` with your
      publisher ID once Google approves the site. The meta tag below proves
      site ownership; the <script> loads the auto-ads loader. Keep both
      commented until approval to avoid serving an empty AdSense bundle.
    -->
    <!-- <meta name="google-adsense-account" content="ca-pub-XXXXXXXXXXXXXXXX"> -->
    <!-- <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-XXXXXXXXXXXXXXXX" crossorigin="anonymous"></script> -->
    <script>
      // Apply persisted theme class before React mounts to avoid a dark/light
      // flash on initial paint. Mirrors the default in client/src/hooks/use-theme.ts.
      (function () {
        try {
          var stored = localStorage.getItem('sg-theme');
          var theme = stored === 'light' || stored === 'dark' ? stored : 'dark';
          document.documentElement.classList.add(theme);
        } catch (_) {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
